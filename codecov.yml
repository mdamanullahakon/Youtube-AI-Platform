# codecov.yml
# Configuration for Codecov coverage tracking.
# Docs: https://docs.codecov.com/docs/codecovyml-reference

codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 1
  round: down
  range: "20...80"
  status:
    project:
      default:
        target: auto
        threshold: 2%
        base: auto
        flags:
          - api
          - dashboard
        paths:
          - "api/src"
          - "apps/dashboard"
      minimum:
        target: 10%
        threshold: 0%
        base: auto
        strict: true
        flags:
          - api
          - dashboard
        if_not_found: failure
        informational: false
    patch:
      default:
        target: auto
        threshold: 10%
        base: auto

comment:
  layout: "header, diff, flags, components"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

flag_management:
  default_rules:
    carryforward: false
    statuses:
      - type: project
        target: auto
        threshold: 2%
      - type: patch
        target: auto
        threshold: 10%

component_management:
  individual_components:
    - component_id: api
      name: API Backend
      paths:
        - api/src/**
    - component_id: dashboard
      name: Dashboard Frontend
      paths:
        - apps/dashboard/**
