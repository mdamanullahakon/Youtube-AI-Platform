# ─────────────────────────────────────────────
# YouTube AI Platform — Production Docker Compose
# ─────────────────────────────────────────────
# Low-cost VPS deployment with nginx reverse proxy,
# health checks, secrets management, and logging.
#
# Usage:
#   cp .env.production.example .env.production
#   # Edit .env.production with your secrets
#   docker compose -f docker/docker-compose.prod.yml --env-file .env.production up -d
#
# With GPU (optional):
#   docker compose -f docker/docker-compose.prod.yml -f docker/docker-compose.gpu.yml --env-file .env.production up -d
# ─────────────────────────────────────────────

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck: &db-healthcheck
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 30s
  start_interval: 2s

x-restart: &restart-policy
  restart: unless-stopped

networks:
  yt-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
    name: yt-postgres-data
  postgres_backup:
    name: yt-postgres-backup
  redis_data:
    name: yt-redis-data
  ollama_data:
    name: yt-ollama-data
  uploads:
    name: yt-uploads
  logs:
    name: yt-logs
  certs:
    name: yt-certs

services:
  # ─── Reverse Proxy ──────────────────────────
  nginx:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nginx
    container_name: yt-nginx
    <<: *restart-policy
    networks:
      - yt-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs:/etc/nginx/certs
      - logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # ─── Database ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: yt-postgres
    <<: *restart-policy
    networks:
      - yt-network
    expose:
      - 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backup:/backup
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-youtube_ai_platform}
      PGDATA: /var/lib/postgresql/data
    command: postgres -c max_connections=200 -c shared_buffers=256MB -c effective_cache_size=768MB -c random_page_cost=1.1 -c effective_io_concurrency=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-youtube_ai_platform}"]
      <<: *db-healthcheck
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ─── Redis ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: yt-redis
    <<: *restart-policy
    networks:
      - yt-network
    expose:
      - 6379
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --lazyfree-lazy-eviction yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
      start_interval: 1s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ─── Ollama (CPU-only) ──────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: yt-ollama
    <<: *restart-policy
    networks:
      - yt-network
    expose:
      - 11434
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  # ─── Ollama Model Initializer ───────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: yt-ollama-init
    networks:
      - yt-network
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "sleep 5 &&
       ollama pull ${OLLAMA_MODEL:-llama3} &&
       echo 'Model ready'"
    logging: *default-logging

  # ─── Database Migration ─────────────────────
  migration:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: yt-migration
    restart: on-failure:3
    networks:
      - yt-network
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-youtube_ai_platform}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy --schema=./prisma/schema.prisma"
    logging: *default-logging

  # ─── API Server ─────────────────────────────
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: yt-api
    <<: *restart-policy
    networks:
      - yt-network
    expose:
      - 4000
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
      - ./secrets:/app/secrets:ro
    environment:
      NODE_ENV: production
      PORT: 4000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-youtube_ai_platform}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_TLS_ENABLED: ${REDIS_TLS_ENABLED:-false}
      REDIS_MAX_RETRIES: ${REDIS_MAX_RETRIES:-10}
      OLLAMA_HOST: http://ollama:11434
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-https://${DOMAIN:-localhost}}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-3-opus-20240229}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-pro}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-21m00Tcm4TlvDq8ikWAM}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:-}
      YOUTUBE_REFRESH_TOKEN: ${YOUTUBE_REFRESH_TOKEN:-}
      TRANSCRIPT_API_KEY: ${TRANSCRIPT_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@youtube-ai-platform.com}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      QUEUE_CONCURRENCY_VIDEO: ${QUEUE_CONCURRENCY_VIDEO:-1}
      QUEUE_CONCURRENCY_WORKER: ${QUEUE_CONCURRENCY_WORKER:-2}
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # ─── Database Backup ────────────────────────
  backup:
    image: alpine:3.19
    container_name: yt-backup
    <<: *restart-policy
    networks:
      - yt-network
    volumes:
      - postgres_backup:/backup
      - ./scripts:/scripts:ro
    environment:
      PG_HOST: postgres
      PG_USER: ${POSTGRES_USER:-postgres}
      PG_PASSWORD: ${POSTGRES_PASSWORD}
      PG_DATABASE: ${POSTGRES_DB:-youtube_ai_platform}
      REDIS_HOST: redis
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_DIR: /backup
      SCHEDULE: ${BACKUP_SCHEDULE:-0 3 * * *}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      apk add --no-cache postgresql-client redis findutils bash > /dev/null 2>&1 &&
      echo \"Installing crond...\" &&
      apk add --no-cache dcron > /dev/null 2>&1 &&
      echo \"${SCHEDULE:-0 3 * * *} /bin/sh /scripts/backup.sh >> /var/log/backup.log 2>&1\" > /var/spool/cron/crontabs/root &&
      echo \"Backup scheduled: ${SCHEDULE:-0 3 * * *}\" &&
      touch /var/log/backup.log &&
      tail -f /var/log/backup.log &
      crond -f -l 2
      "
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ─── Dashboard ──────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: yt-dashboard
    <<: *restart-policy
    networks:
      - yt-network
    expose:
      - 3000
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://${DOMAIN:-localhost}}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
