# ─────────────────────────────────────────────
# YouTube AI Platform — Production Docker Compose
# ─────────────────────────────────────────────
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
# With GPU:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.gpu.yml up -d
# ─────────────────────────────────────────────

networks:
  yt-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  # ─── Database ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: yt-postgres
    restart: unless-stopped
    networks:
      - yt-network
    expose:
      - 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-youtube_ai_platform}
    command: postgres -c max_connections=200 -c shared_buffers=256MB -c effective_cache_size=768MB -c random_page_cost=1.1 -c effective_io_concurrency=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-youtube_ai_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
      start_interval: 2s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ─── Redis ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: yt-redis
    restart: unless-stopped
    networks:
      - yt-network
    expose:
      - 6379
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction --lazyfree-lazy-eviction yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
      start_interval: 1s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ─── Ollama (CPU-only) ────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: yt-ollama
    restart: unless-stopped
    networks:
      - yt-network
    expose:
      - 11434
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: 3
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  # ─── Database Migration ───────────────────────
  migration:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: yt-migration
    restart: on-failure:3
    networks:
      - yt-network
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-youtube_ai_platform}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy --schema=./prisma/schema.prisma"
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: 2

  # ─── API Server ───────────────────────────────
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: yt-api
    restart: unless-stopped
    networks:
      - yt-network
    ports:
      - "4000:4000"
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-youtube_ai_platform}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_TLS_ENABLED: ${REDIS_TLS_ENABLED:-false}
      OLLAMA_HOST: http://ollama:11434
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-3-opus-20240229}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-pro}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-21m00Tcm4TlvDq8ikWAM}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:-}
      YOUTUBE_REFRESH_TOKEN: ${YOUTUBE_REFRESH_TOKEN:-}
      TRANSCRIPT_API_KEY: ${TRANSCRIPT_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@youtube-ai-platform.com}
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ─── Dashboard ────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: yt-dashboard
    restart: unless-stopped
    networks:
      - yt-network
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  postgres_data:
    name: yt-postgres-data
    driver: local
  redis_data:
    name: yt-redis-data
    driver: local
  ollama_data:
    name: yt-ollama-data
    driver: local
  uploads:
    name: yt-uploads
    driver: local
  logs:
    name: yt-logs
    driver: local
