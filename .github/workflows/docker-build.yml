name: Docker Build

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Verify Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v5
        with:
          context: api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Dashboard image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Nginx image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.nginx
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
