# YouTube AI Platform — Quick start
# Primary config (recommended): docker/docker-compose.local.yml
# npm run db:up  — uses docker/docker-compose.local.yml
#
# For quick docker compose up at root:

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: youtube_ai_platform
    ports:
      - "5432:5432"
    volumes:
      - yt-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d youtube_ai_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - yt-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  yt-postgres-data:
  yt-redis-data:
