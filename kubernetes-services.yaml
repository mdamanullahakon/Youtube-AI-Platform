apiVersion: v1
kind: Service
metadata:
  name: youtube-ai-api
  namespace: youtube-ai
  labels:
    app: youtube-ai
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 3001
  - name: metrics
    port: 9090
    targetPort: 9090
  selector:
    app: youtube-ai
    tier: api

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: youtube-ai-api-hpa
  namespace: youtube-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: youtube-ai-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: youtube-ai-worker-hpa
  namespace: youtube-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: youtube-ai-worker
  minReplicas: 5
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: youtube-ai-ingress
  namespace: youtube-ai
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: api.youtube-ai.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: youtube-ai-api
            port:
              number: 80
